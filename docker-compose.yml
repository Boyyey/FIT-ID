services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fitid
      POSTGRES_PASSWORD: fitid
      POSTGRES_DB: fitid
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitid -d fitid"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://fitid:fitid@db:5432/fitid
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-set-google-client-id}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')\""]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000/api/v1}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-with-long-random-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-set-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-set-google-client-secret}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pg_data:
